<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用途地域境界線シミュレーター（過半主義）</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX/TSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset('tsx', {
        presets: [
          [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
          Babel.availablePresets['react']
        ]
      });
    </script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800">
    <div id="root" class="max-w-5xl mx-auto"></div>

    <script type="text/babel" data-presets="tsx">
        const { useState } = React;

        // 敷地（筆）のデータ定義
        // points: SVGの多角形描画用座標
        // dom: 過半を占める用途地域（commercial: 商業, residential: 住居）
        const plots = [
            { id: 'L1', name: 'A敷地', points: '200,50 420,50 450,150 200,150', dom: 'commercial', cx: 310, cy: 100, ratio: '商85% : 住15%' },
            { id: 'R1', name: 'B敷地', points: '420,50 600,50 600,150 450,150', dom: 'residential', cx: 530, cy: 100, ratio: '商5% : 住95%' },
            { id: 'L2_left', name: 'C敷地', points: '200,150 320,150 320,280 200,280', dom: 'commercial', cx: 260, cy: 215, ratio: '商100%' },
            // D敷地は都市計画線の左側(x<400)にもまたがるが、右側(住居)の面積の方が広いため全体が住居になる特異点
            { id: 'L2', name: 'D敷地', points: '320,150 550,150 500,280 320,280', dom: 'residential', cx: 435, cy: 215, ratio: '商35% : 住65%' },
            { id: 'R2', name: 'E敷地', points: '550,150 700,150 700,280 500,280', dom: 'residential', cx: 625, cy: 215, ratio: '住100%' },
            { id: 'L3', name: 'F敷地', points: '200,280 350,280 250,420 200,420', dom: 'commercial', cx: 270, cy: 350, ratio: '商100%' },
            // G敷地も境界をまたぐが、右側(住居)が広いため全体が住居
            { id: 'R3', name: 'G敷地', points: '350,280 600,280 600,420 250,420', dom: 'residential', cx: 470, cy: 350, ratio: '商30% : 住70%' },
            // H敷地は逆に右側(住居)にまたはみ出ているが、左側(商業)が広いため全体が商業
            { id: 'L4', name: 'H敷地', points: '200,420 480,420 450,550 200,550', dom: 'commercial', cx: 340, cy: 485, ratio: '商75% : 住25%' },
            { id: 'R4', name: 'I敷地', points: '480,420 600,420 600,550 450,550', dom: 'residential', cx: 540, cy: 485, ratio: '住100%' },
        ];

        // 境界線のSVGパス
        // アニメーションを滑らかにするため、両方のモードで頂点数を同じにしている
        const planLine = "M 400 50 L 400 150 L 400 150 L 400 280 L 400 280 L 400 420 L 400 420 L 400 550";
        const actualLine = "M 420 50 L 450 150 L 320 150 L 320 280 L 350 280 L 250 420 L 480 420 L 450 550";

        const App = () => {
            // 'plan': 都市計画線モード, 'actual': 実務適用線モード
            const [mode, setMode] = useState<'plan' | 'actual'>('plan');

            return (
                <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8">
                    <div className="text-center mb-8">
                        <h1 className="text-2xl md:text-3xl font-extrabold text-slate-800 mb-4">
                            用途地域境界線シミュレーター（過半主義）
                        </h1>
                        <p className="text-slate-600 max-w-2xl mx-auto">
                            都市計画における「用途地域の境界線」は定規で引いたように真っ直ぐですが、実務上は建築基準法第91条に基づき、<strong>敷地の過半が属する地域のルールが敷地全体に適用</strong>されます。<br/>
                            下のボタンを押して、机上の線がどのように現実の敷地に適用されるか確認してください。
                        </p>
                    </div>

                    {/* コントロールボタン */}
                    <div className="flex flex-col sm:flex-row gap-4 mb-8 justify-center">
                        <button
                            onClick={() => setMode('plan')}
                            className={`px-6 py-4 rounded-xl font-bold transition-all duration-300 shadow-sm border-2 ${
                                mode === 'plan' 
                                ? 'bg-blue-50 border-blue-600 text-blue-700 shadow-md transform scale-105' 
                                : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'
                            }`}
                        >
                            <div className="text-sm font-normal mb-1 opacity-80">STEP 1</div>
                            都市計画線（机上の直線）
                        </button>
                        <button
                            onClick={() => setMode('actual')}
                            className={`px-6 py-4 rounded-xl font-bold transition-all duration-300 shadow-sm border-2 ${
                                mode === 'actual' 
                                ? 'bg-orange-50 border-orange-600 text-orange-700 shadow-md transform scale-105' 
                                : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'
                            }`}
                        >
                            <div className="text-sm font-normal mb-1 opacity-80">STEP 2</div>
                            実務適用線（敷地ごとの過半）
                        </button>
                    </div>

                    {/* 凡例 */}
                    <div className="flex flex-wrap justify-center gap-6 mb-4 text-sm font-medium text-slate-700">
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 bg-[#fca5a5] rounded border border-slate-300"></div>
                            商業地域
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 bg-[#86efac] rounded border border-slate-300"></div>
                            第一種住居地域
                        </div>
                        <div className="flex items-center gap-2 ml-4">
                            <div className="w-8 h-1 bg-blue-600"></div>
                            都市計画線
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-1 border-t-4 border-orange-600 border-solid"></div>
                            実務適用線
                        </div>
                    </div>

                    {/* シミュレーション描画エリア */}
                    <div className="relative w-full max-w-3xl mx-auto border-2 border-slate-200 rounded-xl overflow-hidden bg-slate-50">
                        <svg viewBox="0 0 800 600" className="w-full h-auto">
                            <defs>
                                {/* 背景のグリッド */}
                                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" strokeWidth="1"/>
                                </pattern>
                                {/* 都市計画線モード時の、x=400でパキッと分かれるグラデーション */}
                                <linearGradient id="planGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
                                    <stop offset="399.5" stopColor="#fca5a5" />
                                    <stop offset="400.5" stopColor="#86efac" />
                                </linearGradient>
                            </defs>

                            <rect width="800" height="600" fill="url(#grid)" />

                            {/* 敷地群 */}
                            <g>
                                {plots.map(plot => (
                                    <g key={plot.id}>
                                        {/* 下層: 実務適用後の色（過半を占める地域の単色） */}
                                        <polygon
                                            points={plot.points}
                                            fill={plot.dom === 'commercial' ? '#fca5a5' : '#86efac'}
                                            stroke="#f8fafc"
                                            strokeWidth="4"
                                            strokeLinejoin="round"
                                        />
                                        
                                        {/* 上層: 都市計画線の色（x=400で分断されるグラデーション） */}
                                        {/* mode === 'actual' になると透明になり、下層の実務色が浮かび上がる */}
                                        <polygon
                                            points={plot.points}
                                            fill="url(#planGrad)"
                                            stroke="#f8fafc"
                                            strokeWidth="4"
                                            strokeLinejoin="round"
                                            style={{
                                                opacity: mode === 'plan' ? 1 : 0,
                                                transition: 'opacity 0.6s ease-in-out'
                                            }}
                                        />

                                        {/* テキストラベル */}
                                        <text x={plot.cx} y={plot.cy - 6} textAnchor="middle" className="text-[15px] font-bold fill-slate-800">
                                            {plot.name}
                                        </text>
                                        <text x={plot.cx} y={plot.cy + 14} textAnchor="middle" className="text-[12px] font-medium fill-slate-700 bg-white">
                                            {plot.ratio}
                                        </text>
                                    </g>
                                ))}
                            </g>

                            {/* 境界線描画 */}
                            
                            {/* 1. 都市計画線 (青): 常に直線を維持。Actualモード時は少し薄くなる */}
                            <line
                                x1="400" y1="30" x2="400" y2="570"
                                stroke="#2563eb"
                                strokeWidth="4"
                                strokeDasharray="8 6"
                                style={{
                                    opacity: mode === 'plan' ? 1 : 0.25,
                                    transition: 'opacity 0.6s ease-in-out'
                                }}
                            />

                            {/* 2. 実務適用線 (オレンジ): Plan時は直線(透明)、Actual時にジグザグに変形して浮かび上がる */}
                            <path
                                d={mode === 'plan' ? planLine : actualLine}
                                fill="none"
                                stroke="#ea580c"
                                strokeWidth="6"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                style={{
                                    opacity: mode === 'plan' ? 0 : 1,
                                    transition: 'd 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-in'
                                }}
                            />
                        </svg>
                    </div>

                    {/* 解説パネル */}
                    <div className="mt-8 p-5 bg-blue-50/50 rounded-xl border border-blue-100">
                        <h3 className="font-bold text-lg mb-3 flex items-center text-blue-900">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ポイント解説
                        </h3>
                        <ul className="list-disc pl-6 space-y-2 text-slate-700 leading-relaxed">
                            <li><strong>D敷地・G敷地に注目：</strong> 都市計画線上では左側（商業地域）にもまたがっていますが、面積の過半（65%・70%）が右側（第一種住居地域）にあるため、<strong>実務上は敷地全体に住居地域の用途制限が適用</strong>されます。</li>
                            <li><strong>H敷地に注目：</strong> 逆にH敷地は右側にまたはみ出していますが、過半が商業地域であるため、敷地全体に商業地域のルールが適用されます。</li>
                            <li><strong>建蔽率・容積率は注意：</strong> この「過半主義」が適用されるのは「用途制限（何が建てられるか）」だけです。建蔽率と容積率は、過半ではなくそれぞれの面積比率に応じた「加重平均（面積按分）」で計算される点に注意が必要です。</li>
                        </ul>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
