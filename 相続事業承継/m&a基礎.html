<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP実技対策ダッシュボード - Solarized Light</title>
  
  <!-- 依存ライブラリ (安定版を指定) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS (Typographyプラグインを追加してMarkdownを美しく表示) -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  
  <!-- Recharts (グラフ描画) -->
  <script crossorigin src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
  
  <!-- Marked.js (Markdown解析用) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // Solarized Light カラーパレットの設定
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            solarized: {
              base03:  '#002b36',
              base02:  '#073642', // 見出し・強調テキスト
              base01:  '#586e75', // プライマリテキスト
              base00:  '#657b83', // セカンダリテキスト
              base0:   '#839496',
              base1:   '#93a1a1', // コメント・枠線
              base2:   '#eee8d5', // カード背景 (ハイライト)
              base3:   '#fdf6e3', // 全体背景
              yellow:  '#b58900',
              orange:  '#cb4b16',
              red:     '#dc322f',
              magenta: '#d33682',
              violet:  '#6c71c4',
              blue:    '#268bd2', // メインアクセント
              cyan:    '#2aa198',
              green:   '#859900',
            }
          },
          fontFamily: {
            sans: ['"Noto Sans JP"', '"Hiragino Kaku Gothic ProN"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #fdf6e3; /* solarized-base3 */
      color: #586e75; /* solarized-base01 */
    }
    .dashboard-card {
      background-color: #eee8d5; /* solarized-base2 */
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,43,54,0.05); /* base03 shade */
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(147,161,161,0.3); /* base1 transparent */
      border-top: 4px solid #268bd2; /* solarized-blue アクセントライン */
    }
    
    /* TypographyプラグインのSolarized向けカスタマイズ */
    .prose-solarized {
      color: #586e75;
    }
    .prose-solarized h1, .prose-solarized h2, .prose-solarized h3, .prose-solarized h4 {
      color: #073642; /* base02 */
    }
    .prose-solarized strong {
      color: #002b36; /* base03 */
      font-weight: 700;
    }
    .prose-solarized ul > li::marker {
      color: #268bd2;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/javascript">
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <script type="text/babel" data-presets="tsx">
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

    // =========================================================================
    // 【データ入力エリア】 Quartoライクなシンプル構造
    // ここ以下のテキストや数値を書き換えるだけでダッシュボードが更新されます
    // =========================================================================
    const PAGE_DATA = {
      header: {
        title: "事業承継対策(M&A)",
        subtitle: "1級実技：25 法人の承継対策⑥-2"
      },
      
      // 1. 全体像（Markdown形式で記述可能）
      section1: `
### 現状の課題と顧客ニーズ
* 後継者不在による事業継続リスク
* 経営者個人のハッピーリタイアメント（老後資金の確保）

### FPとしての解決策の方向性
第三者へのM&A（株式譲渡）を実行し、事業と従業員の雇用を維持する。その際、単に株式を譲渡するだけでなく、実行前に**「役員退職金」を支給するスキーム**を組み合わせる。

### 提供価値
法人（株価引き下げ）と個人（退職所得の優遇税制）の両面から税制上のメリットを最大化し、手取額を最適化する。
      `,

      // 2. 5W1H分析
      section2_5w1h: [
        { target: "Who", content: "A社長（売り手・現経営者） と 同業他社B社（買い手）" },
        { target: "What", content: "対象会社（自社）の全株式の譲渡 および 役員退職金の支給" },
        { target: "When", content: "事業承継（M&A）の実行時" },
        { target: "Where", content: "対象会社において" },
        { target: "Why", content: "従業員の雇用維持、事業の存続、創業者利益の獲得（ハッピーリタイアメント）のため" },
        { target: "How", content: "退職金スキームを併用した株式譲渡により、法人・個人の税負担を軽減し手取額を最大化する" }
      ],

      // 3. SWOT分析 (改行は \n で記述)
      section3_swot: {
        s: "長年培った独自の技術力・ノウハウ\n安定した優良な顧客基盤\n（※これらが「のれん代」の源泉）",
        w: "親族内・社内に適任の後継者が不在\n経営者の高齢化による経営体力の低下",
        o: "同業他社（B社など）による事業拡大・買収ニーズ\n業界再編による規模拡大のチャンス",
        t: "社長の健康問題による突然の事業停止リスク\n競合他社の台頭による市場シェア低下"
      },

      // 4. 資産/企業概要の図表（単位：万円）
      section4_charts: {
        title: "企業価値(譲渡価額)の構成イメージ",
        note: "時価純資産＋のれんで算定（仮置きデータ）",
        totalValue: 17000,
        pieData: [
          { name: '簿価純資産', value: 10000 },
          { name: '含み益（不動産等）', value: 2000 },
          { name: 'のれん（営業権）', value: 5000 },
        ],
        // Solarized Colors: Blue, Cyan, Yellow
        colors: ['#268bd2', '#2aa198', '#b58900'] 
      },

      // 5. 節税効果の図表（単位：万円）
      section5_charts: {
        title: "退職金活用スキームの節税効果",
        note: "譲渡価額1.7億円、役員退職金5,000万円支給の場合（仮置き概算）",
        barData: [
          { name: '退職金なし', '手取額': 13540, '譲渡益税': 3460, '退職所得税': 0 },
          { name: '退職金5000万支給', '手取額': 14450, '譲渡益税': 2040, '退職所得税': 510 }
        ]
      },

      // 6. Q&A
      section6_qa: [
        {
          q: "中小企業のM&Aにおける譲渡価額の計算方法は？",
          user: "類似業種比準方式",
          correct: "時価純資産法 ＋ のれん代（営業権：実質利益の数年分など）",
          fp: "類似業種比準方式は「親族内承継（税務署向け）」です。第三者へのM&Aでは、当事者間の合意による「時価」が基準となるため区別しましょう。"
        },
        {
          q: "M＆Aで株式譲渡をする場合の課税関係は？",
          user: "譲渡とみなし配当など",
          correct: "個人の譲渡所得として申告分離課税（20.315%）",
          fp: "第三者への売却は「譲渡所得」のみです。「みなし配当」が発生するのは、発行会社自身に買い取ってもらう場合（自己株式の取得）です。"
        },
        {
          q: "譲渡対価の一部を役員退職金として支給する効果と留意点は？",
          user: "効果：退職所得控除の利用。\n留意点：国税庁への事前届出。",
          correct: "効果：法人の純資産減少により株価が下がり譲渡益税が減少。個人は退職所得控除等で税負担軽減。\n留意点：不相当に高額な退職金は損金不算入となるリスクがある。",
          fp: "事前届出は不要ですが、税務調査で否認されないよう「最終報酬月額×在任年数×功績倍率」の適正額の範囲内に収める必要があります。"
        }
      ]
    };
    // =========================================================================
    // データ入力エリア ここまで
    // =========================================================================


    // --- UIコンポーネント群 ---
    
    // Markdownレンダラーコンポーネント
    const MarkdownText = ({ content }) => {
      const rawMarkup = marked.parse(content);
      return <div className="prose prose-sm md:prose-base prose-solarized max-w-none" dangerouslySetInnerHTML={{ __html: rawMarkup }} />;
    };

    const SectionHeader = ({ title }) => (
      <h2 className="text-xl font-bold text-solarized-base02 mb-4 pb-2 border-b-2 border-solarized-base1/30">{title}</h2>
    );

    const Dashboard = () => {
      const { header, section1, section2_5w1h, section3_swot, section4_charts, section5_charts, section6_qa } = PAGE_DATA;

      return (
        <div className="max-w-7xl mx-auto p-4 sm:p-6 font-sans">
          {/* Header */}
          <header className="mb-8">
            <span className="inline-block px-3 py-1 bg-solarized-blue text-solarized-base3 text-sm font-bold rounded-full mb-3">{header.subtitle}</span>
            <h1 className="text-3xl font-bold text-solarized-base03">{header.title}</h1>
          </header>

          {/* 1. FP目線 全体像 */}
          <section className="dashboard-card">
            <SectionHeader title="1. FP目線 全体像・課題解決方針" />
            <div className="bg-solarized-base3/50 p-5 rounded-md border border-solarized-base1/20">
              <MarkdownText content={section1} />
            </div>
          </section>

          {/* 2. 5W1H分析 */}
          <section className="dashboard-card">
            <SectionHeader title="2. 5W1H分析" />
            <div className="overflow-x-auto">
              <table className="min-w-full border-collapse">
                <tbody>
                  {section2_5w1h.map((item, idx) => (
                    <tr key={idx} className="border-b border-solarized-base1/20 last:border-0">
                      <th className="py-3 px-4 text-left w-24 font-bold text-solarized-blue bg-solarized-base3/30">{item.target}</th>
                      <td className="py-3 px-4 text-solarized-base01">{item.content}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>

          {/* 3. SWOT分析 */}
          <section className="dashboard-card">
            <SectionHeader title="3. SWOT分析 (対象会社)" />
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {[
                { title: 'Strengths (強み)', text: section3_swot.s, color: 'text-solarized-green', border: 'border-solarized-green/30' },
                { title: 'Weaknesses (弱み)', text: section3_swot.w, color: 'text-solarized-blue', border: 'border-solarized-blue/30' },
                { title: 'Opportunities (機会)', text: section3_swot.o, color: 'text-solarized-yellow', border: 'border-solarized-yellow/30' },
                { title: 'Threats (脅威)', text: section3_swot.t, color: 'text-solarized-red', border: 'border-solarized-red/30' }
              ].map((swot, idx) => (
                <div key={idx} className={`border ${swot.border} bg-solarized-base3/50 p-4 rounded-md`}>
                  <h3 className={`font-bold ${swot.color} mb-2`}>{swot.title}</h3>
                  <ul className="list-disc list-inside text-sm text-solarized-base00 space-y-1">
                    {swot.text.split('\n').map((line, i) => <li key={i}>{line}</li>)}
                  </ul>
                </div>
              ))}
            </div>
          </section>

          {/* Charts Grid */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* 4. 資産/企業概要の図表 */}
            <section className="dashboard-card mb-0 flex flex-col">
              <SectionHeader title="4. 資産 / 企業概要" />
              <p className="text-sm font-bold text-solarized-base02 mb-1">{section4_charts.title}</p>
              <p className="text-xs text-solarized-base00 mb-4">{section4_charts.note}</p>
              <div className="flex-grow h-64 min-h-[250px]">
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie
                      data={section4_charts.pieData}
                      cx="50%" cy="50%" innerRadius={60} outerRadius={90}
                      paddingAngle={2} dataKey="value" stroke="none"
                      label={({name, value}) => `${name}: ${value.toLocaleString()}`}
                    >
                      {section4_charts.pieData.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={section4_charts.colors[index % section4_charts.colors.length]} />
                      ))}
                    </Pie>
                    <Tooltip 
                      formatter={(value) => value.toLocaleString() + '万円'}
                      contentStyle={{ backgroundColor: '#fdf6e3', borderColor: '#93a1a1', color: '#586e75' }}
                    />
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div className="text-center font-bold mt-2 bg-solarized-base3 text-solarized-blue p-2 rounded border border-solarized-base1/20">
                総企業価値: {section4_charts.totalValue.toLocaleString()}万円
              </div>
            </section>

            {/* 5. 節税効果の図表 */}
            <section className="dashboard-card mb-0 flex flex-col">
              <SectionHeader title="5. スキームの効果検証" />
              <p className="text-sm font-bold text-solarized-base02 mb-1">{section5_charts.title}</p>
              <p className="text-xs text-solarized-base00 mb-4">{section5_charts.note}</p>
              <div className="flex-grow h-64 min-h-[250px]">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={section5_charts.barData} margin={{ top: 10, right: 30, left: 0, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#93a1a1" opacity={0.3} />
                    <XAxis dataKey="name" tick={{fontSize: 12, fill: '#657b83'}} axisLine={{ stroke: '#93a1a1' }} />
                    <YAxis tick={{fontSize: 12, fill: '#657b83'}} axisLine={{ stroke: '#93a1a1' }} />
                    <Tooltip 
                      formatter={(value) => value.toLocaleString() + '万円'}
                      contentStyle={{ backgroundColor: '#fdf6e3', borderColor: '#93a1a1', color: '#586e75' }}
                    />
                    <Legend wrapperStyle={{fontSize: '12px', color: '#586e75'}} />
                    <Bar dataKey="譲渡益税" stackId="a" fill="#dc322f" name="税金(譲渡所得)" />    {/* Solarized Red */}
                    <Bar dataKey="退職所得税" stackId="a" fill="#b58900" name="税金(退職所得)" />  {/* Solarized Yellow */}
                    <Bar dataKey="手取額" stackId="a" fill="#859900" name="手取額" />          {/* Solarized Green */}
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </section>
          </div>

          {/* 6. Q&Aと実務解説 */}
          <section className="dashboard-card mt-6">
            <SectionHeader title="6. Q&AとFP実務解説" />
            <div className="space-y-4">
              {section6_qa.map((item, index) => (
                <div key={index} className="bg-solarized-base3 rounded-md border border-solarized-base1/30">
                  <div className="px-4 py-3 font-bold text-solarized-base03 border-b border-solarized-base1/30 flex gap-2">
                    <span className="text-solarized-blue">Q.</span>
                    <span>{item.q}</span>
                  </div>
                  <div className="p-4 space-y-3">
                    <div className="flex gap-2 text-sm">
                      <span className="font-bold text-solarized-base00 w-12 shrink-0">回答:</span>
                      <p className="text-solarized-base01 whitespace-pre-wrap">{item.user}</p>
                    </div>
                    <div className="flex gap-2 text-sm">
                      <span className="font-bold text-solarized-green w-12 shrink-0">正解:</span>
                      <p className="text-solarized-base02 font-medium whitespace-pre-wrap">{item.correct}</p>
                    </div>
                    <div className="flex gap-2 text-sm bg-solarized-base2 p-3 rounded mt-2 border border-solarized-base1/20">
                      <span className="font-bold text-solarized-orange w-12 shrink-0">FP視点:</span>
                      <p className="text-solarized-base02 leading-relaxed">{item.fp}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </section>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
