<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP1級実技対策：事業承継（従業員承継）ダッシュボード</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #f1f5f9;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: #334155;
    }
    .print-break-inside-avoid {
      page-break-inside: avoid;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Babel Configuration for TSX -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <!-- React Application -->
  <script type="text/babel" data-presets="tsx">
    const { useState } = React;

    // --- 共通コンポーネント ---
    const Card = ({ title, icon, children, className = "" }) => (
      <div className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 print-break-inside-avoid ${className}`}>
        <div className="bg-slate-800 px-5 py-3 flex items-center gap-3 border-b border-slate-200">
          <div className="text-blue-400">{icon}</div>
          <h2 className="text-lg font-bold text-white">{title}</h2>
        </div>
        <div className="p-5">
          {children}
        </div>
      </div>
    );

    // --- モデルケース設定 ---
    const modelCase = {
      president: "A社長 (65歳)",
      company: "株式会社X (非上場・製造業)",
      situation: "業績好調だが親族内に後継者がいない。専務のY氏(45歳)は非常に優秀で事業を熟知しているが、株式買取りの資金がなく、経営者保証を引き継ぐことに難色を示している。",
      assets: {
        shares: 30000, // 単位: 万円
        personal: 15000 // 単位: 万円
      }
    };

    // --- アイコンSVG ---
    const Icons = {
      Eye: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
      Target: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      Swot: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/><path d="M12 3v18"/></svg>,
      PieChart: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
      TrendingDown: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
      MessageCircle: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
    };

    // --- メインアプリケーション ---
    const App = () => {
      return (
        <div className="max-w-5xl mx-auto p-4 md:p-8">
          <header className="mb-8 border-b-4 border-blue-600 pb-4">
            <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">
              実技試験 攻略ダッシュボード
            </h1>
            <p className="text-slate-500 mt-2 font-medium">
              テーマ：法人の承継対策（親族内承継と従業員承継）
            </p>
            <div className="mt-4 bg-blue-50 p-4 rounded-lg border border-blue-100">
              <p className="text-sm font-bold text-blue-800 mb-1">【本日のモデルケース】</p>
              <p className="text-sm text-slate-700">{modelCase.situation}</p>
            </div>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            {/* 1. FP目線全体像 */}
            <div className="md:col-span-2">
              <Card title="1. FP目線全体像" icon={Icons.Eye}>
                <div className="flex flex-col md:flex-row gap-6">
                  <div className="flex-1">
                    <h3 className="font-bold text-blue-700 border-b border-blue-200 pb-1 mb-3">顧客の最大の悩み・課題</h3>
                    <p className="text-sm text-slate-700 leading-relaxed mb-4">
                      「会社を存続させ、従業員の雇用を守りたいが、親族に後継者がいない。」<br/>
                      社内の右腕（Y氏）を後継者としたいが、<strong>「株式買取資金の不足」</strong>と<strong>「経営者保証への抵抗感」</strong>という2つの大きなハードルが存在している。
                    </p>
                    <h3 className="font-bold text-green-700 border-b border-green-200 pb-1 mb-3">FPとしての解決方針</h3>
                    <p className="text-sm text-slate-700 leading-relaxed">
                      単なる税制の解説にとどまらず、Y氏が安心して承継できる環境整備（「カネ」と「リスク」の払拭）を提案する。<br/>
                      具体的には、<strong>法人版事業承継税制（特例措置）</strong>を用いた資金負担ゼロでの株式移転と、<strong>経営者保証に関するガイドライン</strong>等を活用した個人保証の解除を並行して進める。
                    </p>
                  </div>
                  <div className="flex-1 bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h4 className="font-bold text-slate-700 mb-2 text-sm text-center">事業承継の選択肢マトリクス</h4>
                    <div className="space-y-2">
                      <div className="bg-white p-2 text-sm border-l-4 border-slate-300 rounded shadow-sm opacity-50">
                        <span className="font-bold">親族内承継:</span> 今回は対象外（候補者不在）
                      </div>
                      <div className="bg-blue-100 p-2 text-sm border-l-4 border-blue-500 rounded shadow-sm">
                        <span className="font-bold text-blue-800">従業員承継 (MBO等):</span> 第一候補。<br/>課題：資金調達・保証債務
                      </div>
                      <div className="bg-white p-2 text-sm border-l-4 border-amber-400 rounded shadow-sm">
                        <span className="font-bold">第三者承継 (M&A):</span> 第二候補。<br/>従業員承継が頓挫した場合の備え
                      </div>
                    </div>
                  </div>
                </div>
              </Card>
            </div>

            {/* 2. 5W1H分析 */}
            <Card title="2. 5W1H分析" icon={Icons.Target}>
              <ul className="space-y-3">
                {[
                  { label: "Who (誰が)", val: "A社長（65歳）" },
                  { label: "What (何を)", val: "自社株式（100%）と経営権、および経営者保証" },
                  { label: "When (いつ)", val: "なるべく早く（A社長の健康なうち・特例承継計画の期限内）" },
                  { label: "Where (どこで)", val: "株式会社Xにおいて" },
                  { label: "Why (なぜ)", val: "自身の引退、事業の存続、従業員の雇用維持のため" },
                  { label: "How (どのように)", val: "専務Y氏への贈与・譲渡（事業承継税制特例の活用、ガイドラインに基づく保証解除）" }
                ].map((item, i) => (
                  <li key={i} className="flex text-sm">
                    <span className="w-24 font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded-l text-center">{item.label}</span>
                    <span className="flex-1 bg-white border border-l-0 border-slate-100 px-3 py-1 rounded-r text-slate-800">{item.val}</span>
                  </li>
                ))}
              </ul>
            </Card>

            {/* 3. SWOT分析 */}
            <Card title="3. SWOT分析" icon={Icons.Swot}>
              <div className="grid grid-cols-2 gap-2 h-full">
                <div className="bg-blue-50 p-3 rounded border border-blue-100">
                  <h4 className="font-bold text-blue-800 text-xs mb-1">Strength (強み)</h4>
                  <ul className="text-xs space-y-1 list-disc pl-4 text-slate-700">
                    <li>業績が好調である</li>
                    <li>事業を熟知した優秀な右腕(Y氏)の存在</li>
                    <li>A社長のリーダーシップ</li>
                  </ul>
                </div>
                <div className="bg-red-50 p-3 rounded border border-red-100">
                  <h4 className="font-bold text-red-800 text-xs mb-1">Weakness (弱み)</h4>
                  <ul className="text-xs space-y-1 list-disc pl-4 text-slate-700">
                    <li>親族内に後継者がいない</li>
                    <li>Y氏の株式買取資金が不足</li>
                    <li>経営に個人保証が紐づいている</li>
                  </ul>
                </div>
                <div className="bg-green-50 p-3 rounded border border-green-100">
                  <h4 className="font-bold text-green-800 text-xs mb-1">Opportunity (機会)</h4>
                  <ul className="text-xs space-y-1 list-disc pl-4 text-slate-700">
                    <li>法人版事業承継税制（特例措置）</li>
                    <li>経営者保証に関するガイドライン</li>
                    <li>事業承継特別保証制度の整備</li>
                  </ul>
                </div>
                <div className="bg-orange-50 p-3 rounded border border-orange-100">
                  <h4 className="font-bold text-orange-800 text-xs mb-1">Threat (脅威)</h4>
                  <ul className="text-xs space-y-1 list-disc pl-4 text-slate-700">
                    <li>Y氏が承継を拒否した場合の廃業リスク</li>
                    <li>金融機関が保証解除に応じないリスク</li>
                  </ul>
                </div>
              </div>
            </Card>

            {/* 4. 資産/企業概要の図表 */}
            <Card title="4. 資産/企業概要の図表" icon={Icons.PieChart}>
              <div className="mb-4 text-center">
                <p className="text-sm font-bold text-slate-700 mb-2">A社長の資産構成イメージ (合計: 4.5億円)</p>
                
                <div className="h-8 w-full flex rounded-full overflow-hidden mb-2">
                  <div className="bg-blue-500 flex items-center justify-center text-white text-xs font-bold" style={{width: '66.6%'}}>
                    自社株式 (3億円) 66.6%
                  </div>
                  <div className="bg-emerald-500 flex items-center justify-center text-white text-xs font-bold" style={{width: '33.3%'}}>
                    個人資産 (1.5億円) 33.3%
                  </div>
                </div>
                <p className="text-xs text-slate-500 text-left mt-2">
                  ※資産の大部分が「自社株式」に偏っている。<br/>これをY氏に有償譲渡（MBO）できればA社長の老後資金になるが、Y氏には3億円を用意できない課題がある。
                </p>
              </div>
            </Card>

            {/* 5. 節税効果の図表 */}
            <Card title="5. 節税効果の図表" icon={Icons.TrendingDown}>
               <div className="mb-4 text-center">
                <p className="text-sm font-bold text-slate-700 mb-2">事業承継税制（特例措置）の効果</p>
                <div className="space-y-4">
                  {/* 原則 */}
                  <div>
                    <div className="flex justify-between text-xs mb-1">
                      <span>原則（通常の贈与税）</span>
                      <span className="text-red-600 font-bold">約1.5億円の納税負担</span>
                    </div>
                    <div className="h-6 w-full bg-slate-200 rounded-full overflow-hidden flex">
                      <div className="bg-slate-400 h-full w-1/2 flex items-center justify-center text-white text-xs">株式評価額 3億円</div>
                      <div className="bg-red-500 h-full w-1/2 flex items-center justify-center text-white text-xs font-bold striped-bg">納税額 約1.5億円</div>
                    </div>
                  </div>
                  {/* 特例適用後 */}
                  <div>
                    <div className="flex justify-between text-xs mb-1">
                      <span>特例措置適用後</span>
                      <span className="text-green-600 font-bold">納税負担 0円（100%納税猶予）</span>
                    </div>
                    <div className="h-6 w-full bg-slate-200 rounded-full overflow-hidden flex">
                      <div className="bg-blue-500 h-full w-full flex items-center justify-center text-white text-xs font-bold">
                        全額納税猶予（資金負担ゼロで株式移転可能）
                      </div>
                    </div>
                  </div>
                </div>
                <p className="text-xs text-slate-500 text-left mt-4">
                  ※特例措置を利用することで、Y氏への贈与税負担をゼロにできる。ただし、A社長に譲渡対価は入らないため、A社長の退職金支給（損金算入による法人税減税効果あり）とセットで設計する。
                </p>
              </div>
            </Card>

            {/* 6. Q&Aと実務解説 */}
            <div className="md:col-span-2">
              <Card title="6. Q&Aと実務解説（アウトプットのブラッシュアップ）" icon={Icons.MessageCircle}>
                <div className="space-y-6">
                  
                  {/* Q1-3 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h4 className="font-bold text-slate-800 border-b border-slate-300 pb-2 mb-3">Q: 事業承継の種類と、それぞれの特徴（メリット・デメリット）</h4>
                    <ul className="space-y-4 text-sm">
                      <li className="flex gap-3">
                        <span className="font-bold text-blue-600 shrink-0">親族内</span>
                        <div>
                          <p className="font-bold text-slate-700">メリット：従業員や取引先の理解が得やすい。相続や贈与を利用して株式を移転しやすい。</p>
                          <p className="text-slate-600">デメリット：親族内に、経営の意欲や資質を持った後継者がいるとは限らない。</p>
                        </div>
                      </li>
                      <li className="flex gap-3">
                        <span className="font-bold text-green-600 shrink-0">従業員</span>
                        <div>
                          <p className="font-bold text-slate-700">メリット：既に事業を熟知しているため、経営方針の継続性が保たれる。</p>
                          <p className="text-slate-600">デメリット：後継者に多額の株式購入資金が必要。また、経営者保証を嫌がり承継が進まないリスクがある。</p>
                        </div>
                      </li>
                      <li className="flex gap-3">
                        <span className="font-bold text-amber-600 shrink-0">M&A</span>
                        <div>
                          <p className="font-bold text-slate-700">メリット：広く後継者（買手）を探せる。現経営者は売却益（創業者利益）を獲得できる。</p>
                          <p className="text-slate-600">デメリット：希望条件に合う買手が見つかるとは限らない。従業員の雇用や企業文化が維持されない恐れがある。</p>
                        </div>
                      </li>
                    </ul>
                    <div className="mt-3 bg-blue-100 p-3 rounded text-sm text-blue-900">
                      <strong>【FP実務解説】</strong> 特徴を答える際は、いきなり「遺留分の特例」などの具体的税制・法務を答えるのではなく、上記のように<strong>「ヒト（後継者の資質・理解）」「カネ（資金負担）」「リスク」</strong>の観点から平易な言葉で顧客に伝えることが重要です。
                    </div>
                  </div>

                  {/* Q4-7 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h4 className="font-bold text-slate-800 border-b border-slate-300 pb-2 mb-3">Q: MBO、M&A、および経営者保証について</h4>
                    <div className="space-y-3 text-sm">
                      <p><strong>M&AとMBOの違い：</strong> M&Aは社外の「第三者」が株式を取得するのに対し、MBO（マネジメント・バイアウト）は社内の「役員等（経営陣）」が株式を取得し新経営陣となる手法です。</p>
                      <p><strong>経営者保証とは：</strong> 中小企業が金融機関から融資を受ける際、経営者個人が会社の連帯保証人となることです。</p>
                      <p><strong>後継者が難色を示す理由：</strong> 万が一会社が倒産・業績悪化した場合、後継者「個人」が多額の借金（負債）を被るリスク（個人資産の毀損リスク）があるためです。</p>
                      <p><strong>保証を外すための対策：</strong></p>
                      <ul className="list-disc pl-5 space-y-1 mt-1 text-slate-700">
                        <li>法人と個人の資産の明確な分離や、財務基盤の強化など「経営者保証に関するガイドライン」の要件を満たし、金融機関と交渉する。</li>
                        <li>信用保証協会の「事業承継特別保証制度」等の機関保証を活用する。</li>
                      </ul>
                    </div>
                  </div>

                </div>
              </Card>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* 縞模様の背景ユーティリティ */
    .striped-bg {
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
      background-size: 1rem 1rem;
    }
  </style>
</body>
</html>
