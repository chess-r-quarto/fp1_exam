<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP1級実技対策：事業承継ダッシュボード</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config for Solarized Light -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            solar: {
              base03: '#002b36', // dark highlight
              base02: '#073642', // dark secondary
              base01: '#586e75', // dark primary
              base00: '#657b83', // body text
              base0: '#839496',  // light primary
              base1: '#93a1a1',  // light secondary
              base2: '#eee8d5',  // background highlight
              base3: '#fdf6e3',  // background
              yellow: '#b58900',
              orange: '#cb4b16',
              red: '#dc322f',
              magenta: '#d33682',
              violet: '#6c71c4',
              blue: '#268bd2',
              cyan: '#2aa198',
              green: '#859900',
            }
          },
          fontFamily: {
            sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #fdf6e3; /* Solarized base3 */
      color: #657b83; /* Solarized base00 */
      line-height: 1.6;
    }
    /* 印刷時の改ページ制御 */
    .print-section {
      page-break-inside: avoid;
    }
    /* Quarto風のシンプルなテーブルスタイル */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }
    th, td {
      border-bottom: 1px solid #eee8d5; /* base2 */
      padding: 0.75rem;
      text-align: left;
    }
    th {
      color: #586e75; /* base01 */
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Babel Configuration for TSX -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <!-- React Application -->
  <script type="text/babel" data-presets="tsx">
    const { useState } = React;

    // --- Components ---
    const Section = ({ title, id, children }) => (
      <section className="mb-12 print-section">
        <h2 className="text-2xl font-bold text-solar-base02 border-b-2 border-solar-base2 pb-2 mb-6" id={id}>
          {title}
        </h2>
        <div className="pl-0 md:pl-4">
          {children}
        </div>
      </section>
    );

    // --- Model Case ---
    const modelCase = {
      president: "A社長 (65歳)",
      company: "株式会社X (非上場・製造業)",
      situation: "業績好調。親族に後継者がおらず、右腕の専務Y氏(45歳)への承継（MBO）を検討。しかし、Y氏は「株式買取資金の不足」と「経営者保証の引き継ぎ」、さらに「事業承継税制の認定取消時の税務リスク」を懸念している。",
    };

    const App = () => {
      return (
        <div className="max-w-4xl mx-auto px-6 py-10">
          
          <header className="mb-12">
            <h1 className="text-4xl font-extrabold text-solar-base03 mb-4 tracking-tight">
              法人の事業承継対策（従業員承継）
            </h1>
            <div className="bg-solar-base2 p-4 border-l-4 border-solar-blue text-solar-base01">
              <p className="font-bold text-solar-base02 mb-1">【本日のモデルケース】</p>
              <p>{modelCase.situation}</p>
            </div>
          </header>

          <main>
            {/* 1. FP目線全体像 */}
            <Section title="1. FP目線全体像" id="overview">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                  <h3 className="font-bold text-solar-base02 mb-2">顧客の課題（ニーズ）</h3>
                  <ul className="list-disc pl-5 space-y-1 text-solar-base00">
                    <li>会社と従業員の雇用を守るため、事業を熟知したY氏に経営を任せりたい。</li>
                    <li>しかし、Y氏には数億円の株式を買い取る個人の資金力がない。</li>
                    <li>Y氏は経営者個人の連帯保証（経営者保証）を被ることを恐れている。</li>
                  </ul>
                </div>
                <div>
                  <h3 className="font-bold text-solar-base02 mb-2">FPの解決方針</h3>
                  <ul className="list-disc pl-5 space-y-1 text-solar-base00">
                    <li><strong>カネの解決：</strong> 法人版事業承継税制（特例措置）を活用し、贈与税ゼロで株式を移転する。または、SPC（特別目的会社）を用いたMBOスキームを構築する。</li>
                    <li><strong>リスクの解決：</strong> 「経営者保証に関するガイドライン」の要件を満たすよう財務基盤を整備し、承継時の保証解除を金融機関と交渉する。</li>
                  </ul>
                </div>
              </div>
            </Section>

            {/* 2. 5W1H分析 */}
            <Section title="2. 5W1H分析" id="5w1h">
              <table>
                <tbody>
                  <tr><th className="w-1/4">Who (誰が)</th><td>A社長（65歳）から専務Y氏（45歳）へ</td></tr>
                  <tr><th>What (何を)</th><td>自社株式（経営権）および 経営者保証</td></tr>
                  <tr><th>When (いつ)</th><td>特例承継計画の提出期限内（早期に）</td></tr>
                  <tr><th>Where (どこで)</th><td>株式会社Xにおいて</td></tr>
                  <tr><th>Why (なぜ)</th><td>社長の高齢化による引退、事業と雇用の存続のため</td></tr>
                  <tr><th>How (どのように)</th><td>事業承継税制（特例措置）の適用、MBO（SPC活用）、経営者保証の解除</td></tr>
                </tbody>
              </table>
            </Section>

            {/* 3. SWOT分析 */}
            <Section title="3. SWOT分析" id="swot">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <h3 className="font-bold text-solar-base02 border-b border-solar-base2 pb-1 mb-2">内部環境</h3>
                  <div className="mb-4">
                    <span className="font-bold text-solar-green">強み (Strength):</span>
                    <p className="text-sm mt-1">業績好調、事業を熟知した優秀な右腕（Y氏）の存在</p>
                  </div>
                  <div>
                    <span className="font-bold text-solar-red">弱み (Weakness):</span>
                    <p className="text-sm mt-1">親族に後継者不在、Y氏の資金力不足、経営者保証の存在</p>
                  </div>
                </div>
                <div>
                  <h3 className="font-bold text-solar-base02 border-b border-solar-base2 pb-1 mb-2">外部環境</h3>
                  <div className="mb-4">
                    <span className="font-bold text-solar-blue">機会 (Opportunity):</span>
                    <p className="text-sm mt-1">法人版事業承継税制（特例措置）、経営者保証に関するガイドライン等の国策支援</p>
                  </div>
                  <div>
                    <span className="font-bold text-solar-orange">脅威 (Threat):</span>
                    <p className="text-sm mt-1">Y氏の承継拒否による廃業リスク、金融機関の保証解除拒否、税制の要件未達による認定取消リスク</p>
                  </div>
                </div>
              </div>
            </Section>

            {/* 4. 資産/企業概要の図表 */}
            <Section title="4. 資産/企業概要の図表" id="assets">
              <p className="mb-4 text-solar-base01">A社長の資産構成イメージ（総資産額を100とした場合の割合）</p>
              
              {/* シンプルな積み上げ棒グラフの表現 */}
              <div className="w-full h-8 bg-solar-base2 flex font-bold text-xs">
                <div className="bg-solar-cyan text-solar-base3 flex items-center justify-center px-2" style={{ width: '70%' }}>
                  自社株式 (約70%) - 非流動資産
                </div>
                <div className="bg-solar-blue text-solar-base3 flex items-center justify-center px-2" style={{ width: '30%' }}>
                  個人資産 (約30%)
                </div>
              </div>
              <p className="text-sm mt-2 text-solar-base01">
                ※資産の大部分が非上場の自社株式に偏っている。Y氏に有償で譲渡（MBO）できれば社長の老後資金となるが、Y氏の買取資金調達（SPCの設立と金融機関からのLBOローン等）が必須となる。
              </p>
            </Section>

            {/* 5. 節税効果の図表 */}
            <Section title="5. 節税効果・株価対策の図表" id="tax">
              <h3 className="font-bold text-solar-base02 mb-2">事業承継税制（特例措置 vs 一般措置）の効果比較</h3>
              <table>
                <thead>
                  <tr>
                    <th>項目</th>
                    <th>一般措置</th>
                    <th>特例措置（提案）</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>対象株式数の上限</td>
                    <td>総議決権数の2/3まで</td>
                    <td className="font-bold text-solar-blue">上限なし（全株式対象）</td>
                  </tr>
                  <tr>
                    <td>納税猶予割合</td>
                    <td>贈与税100% / 相続税80%</td>
                    <td className="font-bold text-solar-blue">贈与・相続ともに100%</td>
                  </tr>
                  <tr>
                    <td>雇用確保要件（5年間8割）</td>
                    <td>未達の場合は原則認定取消</td>
                    <td className="font-bold text-solar-blue">未達でも理由書提出で猶予継続可</td>
                  </tr>
                </tbody>
              </table>

              <div className="mt-6 bg-solar-base2 p-4">
                <h4 className="font-bold text-solar-base02 text-sm mb-2">⚠️ 株価引き下げ対策（記念配当）の注意点</h4>
                <p className="text-sm text-solar-base00">
                  純資産額を下げるために過大な「記念配当」を実施した場合、類似業種比準方式の計算上「配当要素」からは除外されるため計算上の株価は下がる。しかし、<strong>「同族会社の行為計算の否認」</strong>として税務署に否認されるリスクや、社長個人の<strong>総合課税による所得税負担（最高55%）</strong>が過大になるリスクに留意する必要がある。
                </p>
              </div>
            </Section>

            {/* 6. Q&Aと実務解説 */}
            <Section title="6. Q&Aと実務解説" id="qa">
              <div className="space-y-6">
                
                <div>
                  <h4 className="text-lg font-bold text-solar-base02 mb-1">Q1. 従業員に「相続時精算課税制度」は適用できますか？</h4>
                  <p className="pl-4 border-l-2 border-solar-base1 text-solar-base00">
                    <strong>A. 適用できません。</strong><br />
                    相続時精算課税制度は、原則として60歳以上の父母・祖父母から18歳以上の子・孫への贈与に限定されています。従業員（親族外）への贈与は「暦年課税」となります。<br />
                    <span className="text-sm text-solar-orange block mt-1">※実務上の留意点：従業員承継で事業承継税制（特例）を利用し、後に要件未達で認定取消となった場合、暦年課税の一般税率（最高55%）で多額の贈与税が一括請求される大きなリスクがあることを説明する必要があります。</span>
                  </p>
                </div>

                <div>
                  <h4 className="text-lg font-bold text-solar-base02 mb-1">Q2. M&AとMBOの違いは何ですか？</h4>
                  <p className="pl-4 border-l-2 border-solar-base1 text-solar-base00">
                    <strong>A. 買い手が異なります。</strong><br />
                    M&Aは社外の「第三者（他社）」が株式を取得するのに対し、MBOは社内の「役員等（Y専務など）」が株式を取得して新経営陣となります。MBOの場合、後継者個人では資金が足りないため、通常は<strong>SPC（特別目的会社）</strong>を設立し、金融機関から買収資金を借入れるスキーム（LBO等）が用いられます。
                  </p>
                </div>

                <div>
                  <h4 className="text-lg font-bold text-solar-base02 mb-1">Q3. 従業員承継のメリットとデメリットを平易な言葉で説明してください。</h4>
                  <p className="pl-4 border-l-2 border-solar-base1 text-solar-base00">
                    <strong>A. 以下のようになります。</strong><br />
                    【メリット】既に会社の業務や社風をよく知っている優秀な方に任せるため、事業をスムーズに継続できます。<br />
                    【デメリット】後継者の方が株を買い取るための多額の資金を用意する必要がある点や、会社の借金の連帯保証（個人保証）を背負うことに抵抗感を持たれる点です。
                  </p>
                </div>

              </div>
            </Section>

          </main>
          
          <footer className="mt-16 pt-4 border-t border-solar-base2 text-center text-sm text-solar-base01">
            <p>FP1級 実技試験対策資料 - Created by LearnLM</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
