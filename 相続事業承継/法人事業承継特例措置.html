<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事業承継コンサルティング・ダッシュボード</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration for Solarized Palette -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            solarized: {
              base03: '#002b36',
              base02: '#073642',
              base01: '#586e75',
              base00: '#657b83',
              base0: '#839496',
              base1: '#93a1a1',
              base2: '#eee8d5',
              base3: '#fdf6e3',
              yellow: '#b58900',
              orange: '#cb4b16',
              red: '#dc322f',
              magenta: '#d33682',
              violet: '#6c71c4',
              blue: '#268bd2',
              cyan: '#2aa198',
              green: '#859900',
            }
          },
          fontFamily: {
            sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Babel Custom Preset for TSX -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <style>
    body {
      background-color: #fdf6e3; /* solarized base3 */
      color: #586e75; /* solarized base01 */
      line-height: 1.6;
    }
    /* Quarto-like specific print/layout tweaks */
    .prose-custom h1, .prose-custom h2, .prose-custom h3, .prose-custom h4 {
      color: #073642; /* solarized base02 */
    }
    .prose-custom h2 {
      border-bottom: 1px solid #eee8d5; /* solarized base2 */
      padding-bottom: 0.5rem;
      margin-top: 2.5rem;
      margin-bottom: 1.25rem;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .prose-custom p {
      margin-bottom: 1rem;
    }
    .prose-custom ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .prose-custom li {
      margin-bottom: 0.5rem;
    }
    /* Simple table styling compliant with Digital Agency guidelines (clear borders, high contrast) */
    .table-custom {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }
    .table-custom th, .table-custom td {
      border: 1px solid #93a1a1; /* solarized base1 */
      padding: 0.75rem;
      text-align: left;
    }
    .table-custom th {
      background-color: #eee8d5; /* solarized base2 */
      color: #073642;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="tsx">
    const { useEffect, useRef } = React;

    // Chart Components
    const ShareDoughnutChart = () => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }
        const ctx = chartRef.current.getContext('2d');
        chartInstance.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Aさん (社長)', 'Bさん (妻)'],
            datasets: [{
              data: [60, 40],
              backgroundColor: ['#268bd2', '#cb4b16'], // solarized blue, orange
              borderColor: '#fdf6e3', // match background
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'right',
                labels: { color: '#586e75', font: { size: 14 } }
              }
            }
          }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, []);

      return <canvas ref={chartRef}></canvas>;
    };

    const TaxBarChart = () => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }
        const ctx = chartRef.current.getContext('2d');
        chartInstance.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['特例なし（一般贈与）', '特例税制適用時'],
            datasets: [
              {
                label: '想定贈与税額（万円）',
                data: [6000, 0],
                backgroundColor: '#dc322f', // solarized red
              },
              {
                label: '手元残存価値（万円）',
                data: [6000, 12000],
                backgroundColor: '#859900', // solarized green
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                stacked: true,
                ticks: { color: '#586e75', font: { size: 14 } },
                grid: { display: false }
              },
              y: {
                stacked: true,
                ticks: { color: '#586e75' },
                grid: { color: '#eee8d5' }
              }
            },
            plugins: {
              legend: {
                labels: { color: '#586e75' }
              }
            }
          }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, []);

      return <canvas ref={chartRef}></canvas>;
    };

    const App = () => {
      // Alert/Date Calculation
      const today = new Date('2026-03-16');
      const deadline = new Date('2026-03-31');
      const diffTime = Math.abs(deadline - today);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      return (
        <div className="max-w-4xl mx-auto px-6 py-12 prose-custom">
          
          {/* Document Header (Quarto Style) */}
          <header className="mb-12">
            <h1 className="text-4xl font-bold mb-4">X社 事業承継ケース分析レポート</h1>
            <div className="text-solarized-base00 text-sm space-y-1">
              <p><strong>作成日:</strong> 2026年3月16日</p>
              <p><strong>対象顧客:</strong> Aさん（70歳・X社 2代目社長）</p>
            </div>
            {/* Alert Box - High contrast but fitting the palette */}
            <div className="mt-6 p-4 bg-solarized-base2 border-l-4 border-solarized-red text-solarized-base01">
              <p className="font-bold text-solarized-red m-0">【重要アラート】特例承継計画 提出期限の切迫</p>
              <p className="m-0 mt-1">
                法人版事業承継税制の特例承継計画の提出期限（2026年3月31日）まで残り <strong>{diffDays}日</strong> です。
                認定支援機関への相談と計画策定を最優先で進める必要があります。
              </p>
            </div>
          </header>

          {/* 1. FP目線全体像 */}
          <section>
            <h2>1. FP目線全体像（エグゼクティブ・サマリー）</h2>
            <p>
              X社は業績好調で自己資本も厚い優良企業です。既に自社で実績を積んでいる甥のEさんという適切な後継者候補が存在し、親族（長男・長女）の賛同も得られている点は、事業承継において<strong>極めて理想的な環境</strong>と言えます。
            </p>
            <p>
              しかしながら、自社株の評価額が高額（類似業種比準価額10,000円、純資産価額20,000円）であるため、そのまま贈与を行うと多額の税負担が発生します。したがって、贈与税負担を実質ゼロにできる<strong>法人版事業承継税制（特例）の活用が不可欠</strong>です。
            </p>
            <p>
              AさんはM&A業者からのアプローチに逡巡していますが、本件においてM&Aは不要です。「親族内（甥）承継」に集中し、まずは迫り来る「特例承継計画」の提出を確実に行うことがFPとしての最優先提案となります。
            </p>
          </section>

          {/* 2. 5W1H分析 */}
          <section>
            <h2>2. 5W1H分析</h2>
            <table className="table-custom">
              <tbody>
                <tr>
                  <th className="w-1/4">Who (誰が)</th>
                  <td>Aさん（70歳・現社長）から 甥Eさん（42歳・主要店舗店長）へ</td>
                </tr>
                <tr>
                  <th>What (何を)</th>
                  <td>X社（大会社・食品スーパー）の代表権と株式（経営権および財産権）</td>
                </tr>
                <tr>
                  <th>When (いつ)</th>
                  <td>
                    近いうち（まずは役員登用、ゆくゆくは社長交代）。<br/>
                    <strong>※特例税制の計画提出期限：2026年3月31日</strong>
                  </td>
                </tr>
                <tr>
                  <th>Where (どこで)</th>
                  <td>大都市近郊（X社の事業基盤・商圏内）</td>
                </tr>
                <tr>
                  <th>Why (なぜ)</th>
                  <td>Aさんの高齢化。Eさんに将来を託す展望があり、実子も賛同しているため。</td>
                </tr>
                <tr>
                  <th>How (どのように)</th>
                  <td>法人版事業承継税制（特例措置）を活用し、贈与税を実質免除して株式を移転する。</td>
                </tr>
              </tbody>
            </table>
          </section>

          {/* 3. SWOT分析 */}
          <section>
            <h2>3. SWOT分析</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="p-4 border border-solarized-base1 bg-white/50">
                <h3 className="text-solarized-blue font-bold text-lg mb-2">Strengths (強み)</h3>
                <ul className="m-0">
                  <li>業績堅調（売上25億、経常利益5千万）</li>
                  <li>後継者Eさんが既に自社で実績（店長）あり</li>
                  <li>長男C・長女Dが承継に賛同済み</li>
                  <li>財務基盤が強固（純資産4億円）</li>
                </ul>
              </div>
              <div className="p-4 border border-solarized-base1 bg-white/50">
                <h3 className="text-solarized-red font-bold text-lg mb-2">Weaknesses (弱み)</h3>
                <ul className="m-0">
                  <li>自社株評価額が高い（類似1万, 純資産2万）</li>
                  <li>妻Bさんが40%の株式を保有（権利分散）</li>
                  <li>Aさんの事業承継税制とM&Aの知識不足</li>
                </ul>
              </div>
              <div className="p-4 border border-solarized-base1 bg-white/50">
                <h3 className="text-solarized-yellow font-bold text-lg mb-2">Opportunities (機会)</h3>
                <ul className="m-0">
                  <li>法人版事業承継税制(特例)による税負担の抜本的軽減</li>
                  <li>メインバンク（認定支援機関）からのサポート</li>
                </ul>
              </div>
              <div className="p-4 border border-solarized-base1 bg-white/50">
                <h3 className="text-solarized-base02 font-bold text-lg mb-2">Threats (脅威)</h3>
                <ul className="m-0">
                  <li>特例計画の期限（2026.3.31）切れリスク</li>
                  <li>M&A業者の頻繁な営業による意思決定の遅れ・混乱</li>
                  <li>Eさんが法定相続人ではないことによる法務手続の煩雑さ</li>
                </ul>
              </div>
            </div>
          </section>

          {/* 4. 資産/企業概要の図表 */}
          <section>
            <h2>4. 資産・企業概要の図表</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
              <div>
                <table className="table-custom m-0">
                  <tbody>
                    <tr>
                      <th className="w-1/3">会社規模</th>
                      <td>大会社（従業員数80人）</td>
                    </tr>
                    <tr>
                      <th>資本金</th>
                      <td>1,000万円</td>
                    </tr>
                    <tr>
                      <th>売上高</th>
                      <td>25億円</td>
                    </tr>
                    <tr>
                      <th>純資産</th>
                      <td>4億円</td>
                    </tr>
                    <tr>
                      <th>相続税評価額</th>
                      <td>類似: 10,000円/株<br/>純資産: 20,000円/株</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div>
                <p className="font-bold text-center mb-2">株主構成（発行済株式総数2万株）</p>
                <div className="h-64">
                  <ShareDoughnutChart />
                </div>
              </div>
            </div>
          </section>

          {/* 5. 節税効果の図表 */}
          <section>
            <h2>5. 節税効果の図表</h2>
            <p className="text-sm bg-solarized-base2 p-3 rounded mb-4">
              <strong>【試算前提】</strong><br/>
              Aさん保有株式（12,000株）を類似業種比準価額（10,000円/株）で評価し、総額1.2億円の贈与を行うと仮定。特例を適用しない一般贈与の場合、約6,000万円の贈与税が発生する試算。
            </p>
            <div className="h-72 mb-4">
              <TaxBarChart />
            </div>
            <p>
              上記グラフが示す通り、特例を適用することで、AさんからEさんへの経営権移行時に発生する<strong>約6,000万円の納税負担が全額猶予</strong>されます。事業資金や個人の手元資金を流出させることなく、円滑な事業承継を実現できます。
            </p>
          </section>

          {/* 6. Q&Aと実務解説 */}
          <section>
            <h2>6. Q&Aと実務解説</h2>
            <div className="space-y-6">
              
              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  X社の事業を承継していくにあたり、どのような方法がベストと考えられますか？
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold mb-2">A. 事業承継税制（特例措置）の適用がベストです。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> すでに甥のEさんという適切な後継者候補がおり、実子の賛同も得られています。自社株の評価額が高額であるため、税負担を実質ゼロにできる特例の活用が最適解です。M&Aは不要です。
                  </p>
                </div>
              </div>

              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  事業承継税制について簡単に教えてください。
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold mb-2">A. 後継者が非上場株式等を相続または贈与により取得した場合、その株式に係る相続税や贈与税が猶予・免除される制度です。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> 今回は生前の交代を想定しているため「贈与税の納税猶予制度」を活用します。要件を満たし手続きを行うことで、多額の贈与税を払うことなく株式を移転できます。
                  </p>
                </div>
              </div>

              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  事業承継税制の特例を使う上での留意点はありますか？
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold text-solarized-red mb-2">A. 2026年3月31日までに「特例承継計画」を都道府県知事に提出する必要があります。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> 認定経営革新等支援機関（メインバンク等）の所見を記載した計画書の提出が必須です。期限が極めて迫っているため、これが当面の最重要タスクとなります。
                  </p>
                </div>
              </div>

              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  特例措置の適用期限はいつまでですか？
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold mb-2">A. 2027年12月31日までです。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> 計画の提出期限（2026年3月末）とは別に、実際に株式の贈与等を行って特例を適用させるための期限が2027年末です。計画提出後、この期限内に実行に移す必要があります。
                  </p>
                </div>
              </div>

              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  贈与税に係る事業承継税制の適用を受けるための後継者の要件について教えてください。
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold mb-2">A. 贈与直前において役員に就任していること、贈与によって代表権を有すること、議決権数の50％超を保有すること等が挙げられます。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> Eさんは現在店長ですが役員ではありません。原則として「贈与直前において3年以上役員等であること」が求められるため、早期の役員登用が必要です。
                  </p>
                </div>
              </div>

              <div className="bg-white/60 p-5 rounded border border-solarized-base2">
                <h4 className="font-bold text-lg mb-2 flex items-start">
                  <span className="text-solarized-blue mr-2">Q.</span>
                  株式はＡさんが60%、Ｂさんが40%保有していますが、贈与の順番に関して注意すべき点はありますか？
                </h4>
                <div className="pl-6 border-l-2 border-solarized-blue">
                  <p className="font-bold mb-2">A. 代表権を有しているAさんから先に贈与を受け、その後にBさんから贈与を受ける必要があります。</p>
                  <p className="text-sm">
                    <strong>【解説】</strong> 本特例では、最初の贈与者（筆頭贈与者）は「代表権を有していた者」でなければなりません。代表権のないBさんから先に贈与を受けると、その分の株式は特例の対象外となってしまうため、順番に細心の注意が必要です。
                  </p>
                </div>
              </div>

            </div>
          </section>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
