<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP1級 実技対策ダッシュボード：金庫株の活用</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for in-browser compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Babel Configuration for TSX -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f9fafb;
      margin: 0;
    }
    /* カスタムスクロールバー */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Application Logic (React/TSX) -->
  <script type="text/babel" data-presets="tsx">
    const { useState } = React;

    // --- Icons (Inline SVGs) ---
    const IconUser = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    );
    const IconPieChart = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
    );
    const IconMessageCircle = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
    );
    const IconBriefcase = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    );
    const IconChevronDown = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    );
    const IconChevronUp = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    );

    // --- Types ---
    type TabType = 'overview' | 'swot' | 'qa' | 'fp';

    // --- Components ---

    // 1. 設例概要パネル
    const OverviewPanel = () => (
      <div className="space-y-6 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">設例の概要（5W1H分析）</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <h3 className="font-bold text-lg text-blue-800 mb-3 flex items-center"><IconUser /><span className="ml-2">登場人物・企業</span></h3>
            <ul className="space-y-2 text-gray-700 text-sm">
              <li><span className="font-semibold text-gray-900">Aさん(70歳):</span> X社代表取締役社長。40年前に弟と創業。</li>
              <li><span className="font-semibold text-gray-900">弟Eさん(68歳):</span> X社専務取締役。体調不良。20%の株式保有。</li>
              <li><span className="font-semibold text-gray-900">甥Fさん(45歳):</span> Eさんの長男。X社技術部長。後継者予定。</li>
              <li><span className="font-semibold text-gray-900">非後継者:</span> 長女Cさん(37歳)、二女Dさん(34歳)。経営に関心なし。</li>
              <li><span className="font-semibold text-gray-900">X社:</span> 電子部品製造業。従業員75名。非上場。業績好調。</li>
            </ul>
          </div>
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <h3 className="font-bold text-lg text-green-800 mb-3 flex items-center"><IconBriefcase /><span className="ml-2">現状の課題・目的</span></h3>
            <ul className="space-y-2 text-gray-700 text-sm">
              <li><span className="font-semibold">事業承継:</span> AさんとEさんは引退希望。Fさんへの円滑な株式・経営権の移転。</li>
              <li><span className="font-semibold">資産承継:</span> 評価額の高いX社株式（1.68億円）の納税資金・遺留分対策。</li>
              <li><span className="font-semibold">検討中の施策:</span> 事業承継税制（特例承継計画提出済）、金庫株による換金、遺留分に関する民法特例。</li>
            </ul>
          </div>
        </div>
        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
          <h3 className="font-bold text-lg text-purple-800 mb-3">Aさんの財産構成概要</h3>
          <div className="overflow-x-auto">
            <table className="min-w-full text-sm text-left text-gray-700">
              <thead className="bg-gray-50 text-gray-900">
                <tr><th className="px-4 py-2 rounded-tl-lg">財産項目</th><th className="px-4 py-2 text-right rounded-tr-lg">評価額</th></tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                <tr><td className="px-4 py-2">1. 現預金</td><td className="px-4 py-2 text-right">1億800万円</td></tr>
                <tr><td className="px-4 py-2">2. 上場株式</td><td className="px-4 py-2 text-right">2,400万円</td></tr>
                <tr className="bg-red-50"><td className="px-4 py-2 font-semibold">3. X社株式 (80%)</td><td className="px-4 py-2 text-right font-semibold text-red-600">1億6,800万円</td></tr>
                <tr><td className="px-4 py-2">4. 自宅 (土地・建物)</td><td className="px-4 py-2 text-right">1億円</td></tr>
                <tr className="bg-red-50"><td className="px-4 py-2 font-semibold">5. X社本社・工場土地</td><td className="px-4 py-2 text-right font-semibold text-red-600">1億2,000万円</td></tr>
                <tr className="font-bold bg-gray-100"><td className="px-4 py-2">合計</td><td className="px-4 py-2 text-right">5億2,000万円</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );

    // 2. SWOT分析パネル
    const SwotPanel = () => (
      <div className="space-y-6 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">相談者のSWOT分析</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="bg-blue-50 p-5 rounded-xl border border-blue-200">
            <h3 className="font-bold text-xl text-blue-900 mb-2">S (Strengths: 強み)</h3>
            <ul className="list-disc list-inside space-y-1 text-sm text-blue-800">
              <li>取引先から高く評価される技術力。業績好調。</li>
              <li>既に後継者(Fさん)が技術部門の中核であり、就任を承諾済。</li>
              <li>事業承継税制の特例承継計画を県知事に提出し、確認済。</li>
            </ul>
          </div>
          <div className="bg-red-50 p-5 rounded-xl border border-red-200">
            <h3 className="font-bold text-xl text-red-900 mb-2">W (Weaknesses: 弱み)</h3>
            <ul className="list-disc list-inside space-y-1 text-sm text-red-800">
              <li>Aさんの財産における自社株と事業用不動産の割合が高い（約55%）。</li>
              <li>非後継者(長女・二女)が経営に関心がなく、相続時に遺留分トラブルのリスクがある。</li>
            </ul>
          </div>
          <div className="bg-green-50 p-5 rounded-xl border border-green-200">
            <h3 className="font-bold text-xl text-green-900 mb-2">O (Opportunities: 機会)</h3>
            <ul className="list-disc list-inside space-y-1 text-sm text-green-800">
              <li>事業承継税制の特例措置（100％納税猶予）が利用可能。</li>
              <li>みなし配当課税の特例や、取得費加算の特例など、自社株対策に有利な税制が存在。</li>
              <li>遺留分に関する民法特例（除外合意・固定合意）が利用可能。</li>
            </ul>
          </div>
          <div className="bg-yellow-50 p-5 rounded-xl border border-yellow-200">
            <h3 className="font-bold text-xl text-yellow-900 mb-2">T (Threats: 脅威)</h3>
            <ul className="list-disc list-inside space-y-1 text-sm text-yellow-800">
              <li>弟Eさんの体調不良。Aさんより先に相続が発生した場合、Eさん保有株(20%)が分散する恐れ。</li>
            </ul>
          </div>
        </div>
      </div>
    );

    // 3. Q&A 解説パネル
    const QaItem = ({ question, answer, explanation, isCrucial }: { question: string, answer: string, explanation: string, isCrucial?: boolean }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className={`border rounded-lg mb-3 overflow-hidden transition-all duration-200 ${isCrucial ? 'border-red-300 shadow-sm' : 'border-gray-200'}`}>
          <button 
            className={`w-full text-left px-5 py-4 flex justify-between items-center focus:outline-none ${isOpen ? 'bg-gray-50' : 'bg-white'} ${isCrucial ? 'bg-red-50/30' : ''}`}
            onClick={() => setIsOpen(!isOpen)}
          >
            <span className={`font-semibold ${isCrucial ? 'text-red-700' : 'text-gray-800'}`}>Q. {question}</span>
            {isOpen ? <IconChevronUp /> : <IconChevronDown />}
          </button>
          {isOpen && (
            <div className="px-5 py-4 bg-white border-t border-gray-100">
              <div className="mb-3">
                <span className="inline-block px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded mr-2">正解</span>
                <span className="text-gray-800 font-medium">{answer}</span>
              </div>
              <div className="bg-gray-50 p-3 rounded text-sm text-gray-700 border-l-4 border-blue-400">
                <p className="font-semibold text-blue-800 mb-1">解説</p>
                {explanation}
              </div>
            </div>
          )}
        </div>
      );
    };

    const QaPanel = () => (
      <div className="space-y-4 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2 flex items-center justify-between">
          <span>Q&A 解説：金庫株の論点</span>
          <span className="text-sm font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded">クリックで解説を開く</span>
        </h2>
        
        <QaItem 
          question="金庫株とはどのようなものですか？" 
          answer="企業が自社の株式を買い戻して保有する株式（自己株式）" 
          explanation="売買などの予定がない、流動性の低い株式というだけでなく、具体的には「発行会社自身が取得・保有している自己株式」のことを指します。" 
        />
        <QaItem 
          question="現時点でAさんが金庫株により換金した場合の課税関係は？" 
          answer="配当所得として総合課税（みなし配当）" 
          explanation="生前に会社へ株式を譲渡した場合、譲渡した株に対応する資本金等の額と取得価額との差額は譲渡所得（20.315％分離課税）ですが、資本金等の額を超えた金額は「みなし配当」として総合課税（最大約55%）となります。税負担が重いため通常は生前には行いません。" 
          isCrucial={true}
        />
        <QaItem 
          question="Ａさんの相続後に金庫株を活用するメリットは？" 
          answer="承継意思のない相続人から会社が買い取ることで、手元に現金を残せる" 
          explanation="後継者以外の相続人（Cさん、Dさん）が取得した株式をX社が買い取ることで、相続人は現金の形で財産を受け取れます。これにより、相続税の納税資金や、代償分割の資金を確保できます。" 
        />
        <QaItem 
          question="相続人が取得した株式を金庫株として譲渡した場合の課税関係は？" 
          answer="すべて譲渡所得としての分離課税（みなし配当課税の特例）" 
          explanation="相続開始後、一定期間内に相続人が金庫株として発行会社に譲渡した場合は、みなし配当課税はされず、全額が譲渡所得（申告分離課税：20.315%）となります。これにより税負担が大幅に軽減されます。" 
          isCrucial={true}
        />
        <QaItem 
          question="みなし配当課税の特例を適用するための期限は？" 
          answer="相続税の申告期限の翌日から3年以内" 
          explanation="相続開始の日の翌日から起算して3年10ヶ月以内（＝相続税の申告期限から3年以内）に譲渡する必要があります。" 
        />
        <QaItem 
          question="みなし配当課税の特例と併用できる特例は？" 
          answer="相続税の取得費加算の特例" 
          explanation="譲渡した株式に対応する相続税額を、譲渡所得の計算上、取得費に加算できる特例です。みなし配当の特例と併用することで、譲渡益をさらに圧縮し、税負担を最小限に抑えることが可能です。" 
        />
      </div>
    );

    // 4. FPの視点パネル
    const FpPerspectivePanel = () => (
      <div className="space-y-6 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">FPの視点：提案と解決策</h2>
        
        <div className="bg-white p-6 rounded-xl shadow-sm border border-l-4 border-indigo-500">
          <h3 className="text-xl font-bold text-indigo-900 mb-3">課題1：遺留分対策と経営権の安定化</h3>
          <p className="text-gray-700 mb-4">
            Aさんの財産はX社株式の評価額が高く、Fさんに全株式を集中させると、Cさん・Dさんの遺留分を侵害する可能性が高いです。また、分散を防ぐ法的措置が必要です。
          </p>
          <div className="bg-indigo-50 p-4 rounded-lg">
            <h4 className="font-bold text-indigo-800 mb-2">💡 提案：遺留分に関する民法の特例</h4>
            <ul className="list-disc list-inside space-y-2 text-sm text-gray-700">
              <li><strong>除外合意：</strong> 後継者Fさんが贈与で取得したX社株式を、遺留分を算定するための基礎財産から<span className="text-red-600 font-bold">除外</span>します。これにより、株式の分散を完全に防ぎます。</li>
              <li><strong>固定合意：</strong> 遺留分算定基礎財産に算入するX社株式の価額を、合意時の時価に<span className="text-red-600 font-bold">固定</span>します。将来、Fさんの努力で株価が上昇しても、遺留分額は増えません。</li>
              <li>※適用要件：現経営者（Aさん）の推定相続人全員（Bさん、Cさん、Dさん）と後継者（Fさん）の合意、および経済産業大臣の確認、家庭裁判所の許可が必要です。</li>
            </ul>
          </div>
        </div>

        <div className="bg-white p-6 rounded-xl shadow-sm border border-l-4 border-emerald-500">
          <h3 className="text-xl font-bold text-emerald-900 mb-3">課題2：非後継者への配慮と納税資金の確保</h3>
          <p className="text-gray-700 mb-4">
            除外合意を成立させるためには、Cさん・Dさんが納得するだけの代償財産（現金など）を用意する必要がありますが、Aさんの現預金だけでは不足する可能性があります。
          </p>
          <div className="bg-emerald-50 p-4 rounded-lg">
            <h4 className="font-bold text-emerald-800 mb-2">💡 提案：金庫株特例と代償分割の組み合わせ</h4>
            <ol className="list-decimal list-inside space-y-2 text-sm text-gray-700">
              <li>Aさんの相続発生時、事業承継税制の適用を受けない「残りのX社株式」をCさん・Dさんに相続させます。</li>
              <li>相続後3年10ヶ月以内に、Cさん・Dさんがその株式をX社に譲渡します（金庫株化）。</li>
              <li><strong>みなし配当課税の特例</strong>と<strong>取得費加算の特例</strong>を適用し、手取り額を最大化します。</li>
              <li>Cさん・Dさんはその現金を、自身の相続税納税資金や、財産分割の資金として活用します。これにより、X社の資金を活用して円満な遺産分割を実現できます。</li>
            </ol>
          </div>
        </div>
      </div>
    );

    // --- Main Application Component ---
    const App = () => {
      const [activeTab, setActiveTab] = useState<TabType>('overview');

      const renderContent = () => {
        switch (activeTab) {
          case 'overview': return <OverviewPanel />;
          case 'swot': return <SwotPanel />;
          case 'qa': return <QaPanel />;
          case 'fp': return <FpPerspectivePanel />;
          default: return <OverviewPanel />;
        }
      };

      return (
        <div className="flex h-screen overflow-hidden bg-gray-50">
          {/* Sidebar */}
          <div className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10">
            <div className="p-5 border-b border-slate-700">
              <h1 className="text-lg font-bold leading-tight">FP1級 実技対策<br/><span className="text-blue-400 text-sm">事業承継・金庫株の活用</span></h1>
            </div>
            <nav className="flex-1 py-4">
              <ul className="space-y-1">
                <li>
                  <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center px-6 py-3 text-sm font-medium transition-colors ${activeTab === 'overview' ? 'bg-blue-600 text-white border-r-4 border-blue-300' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <IconPieChart /> <span className="ml-3">設例概要</span>
                  </button>
                </li>
                <li>
                  <button onClick={() => setActiveTab('swot')} className={`w-full flex items-center px-6 py-3 text-sm font-medium transition-colors ${activeTab === 'swot' ? 'bg-blue-600 text-white border-r-4 border-blue-300' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                    <span className="ml-3">SWOT分析</span>
                  </button>
                </li>
                <li>
                  <button onClick={() => setActiveTab('qa')} className={`w-full flex items-center px-6 py-3 text-sm font-medium transition-colors ${activeTab === 'qa' ? 'bg-blue-600 text-white border-r-4 border-blue-300' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <IconMessageCircle /> <span className="ml-3">Q&A 解説</span>
                  </button>
                </li>
                <li>
                  <button onClick={() => setActiveTab('fp')} className={`w-full flex items-center px-6 py-3 text-sm font-medium transition-colors ${activeTab === 'fp' ? 'bg-blue-600 text-white border-r-4 border-blue-300' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <IconBriefcase /> <span className="ml-3">FPの視点・提案</span>
                  </button>
                </li>
              </ul>
            </nav>
            <div className="p-4 bg-slate-800 text-xs text-slate-400">
              試験範囲: 法人の承継対策<br/>
              テーマ: 金庫株・遺留分特例
            </div>
          </div>

          {/* Main Content */}
          <div className="flex-1 flex flex-col overflow-hidden">
            <header className="bg-white shadow-sm z-0">
              <div className="max-w-5xl mx-auto px-6 py-4">
                <p className="text-sm text-gray-500 font-medium tracking-wider uppercase">Case Study Analysis</p>
                <h2 className="text-xl font-bold text-gray-800">Aさん（70歳）の事業・資産承継対策</h2>
              </div>
            </header>
            
            <main className="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
              <div className="max-w-5xl mx-auto">
                {renderContent()}
              </div>
            </main>
          </div>
        </div>
      );
    };

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
