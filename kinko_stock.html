<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP1級 実技対策ダッシュボード：金庫株の活用（図解追加版）</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for in-browser compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Babel Configuration for TSX -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
        Babel.availablePresets['react']
      ]
    });
  </script>

  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f9fafb;
      margin: 0;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    
    /* グラフアニメーション用 */
    @keyframes growWidth {
      from { width: 0; }
    }
    .animate-grow-width {
      animation: growWidth 1s ease-out forwards;
    }
    @keyframes growHeight {
      from { height: 0; }
    }
    .animate-grow-height {
      animation: growHeight 1s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="tsx">
    const { useState, useEffect } = React;

    // --- Icons (Inline SVGs) ---
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconPieChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
    const IconMessageCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const IconBriefcase = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const IconChevronUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>;
    const IconChartBar = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;

    // --- Types ---
    type TabType = 'overview' | 'swot' | 'qa' | 'fp';

    // --- Custom Chart Components ---

    // 1. 財産構成の帯グラフ (Asset Breakdown Bar Chart)
    const AssetBreakdownChart = () => {
      const assets = [
        { name: 'X社株式', value: 16800, color: 'bg-red-500', textColor: 'text-red-700' },
        { name: 'X社不動産', value: 12000, color: 'bg-orange-400', textColor: 'text-orange-700' },
        { name: '現預金', value: 10800, color: 'bg-blue-400', textColor: 'text-blue-700' },
        { name: '自宅等', value: 10000, color: 'bg-green-400', textColor: 'text-green-700' },
        { name: '上場株式', value: 2400, color: 'bg-purple-400', textColor: 'text-purple-700' },
      ];
      const total = 52000;

      return (
        <div className="my-6 p-4 bg-white rounded-lg border border-gray-100 shadow-inner">
          <h4 className="text-sm font-bold text-gray-600 mb-3 text-center">Aさんの財産構成割合 (総額 5億2,000万円)</h4>
          
          {/* 積み上げバー */}
          <div className="w-full h-8 flex rounded-full overflow-hidden shadow-sm mb-4 bg-gray-200">
            {assets.map((asset, index) => {
              const percentage = (asset.value / total) * 100;
              return (
                <div 
                  key={index} 
                  className={`h-full ${asset.color} flex items-center justify-center transition-all duration-1000 animate-grow-width`}
                  style={{ width: `${percentage}%` }}
                  title={`${asset.name}: ${asset.value}万円 (${percentage.toFixed(1)}%)`}
                >
                  {percentage > 10 && <span className="text-white text-xs font-bold">{percentage.toFixed(0)}%</span>}
                </div>
              );
            })}
          </div>

          {/* 凡例 */}
          <div className="flex flex-wrap justify-center gap-4 text-xs">
            {assets.map((asset, index) => {
              const percentage = (asset.value / total) * 100;
              const isBusinessAsset = asset.name.includes('X社');
              return (
                <div key={index} className="flex items-center">
                  <span className={`w-3 h-3 rounded-full mr-1.5 ${asset.color}`}></span>
                  <span className={`font-medium ${asset.textColor}`}>
                    {asset.name} {isBusinessAsset ? '(事業用)' : ''}
                    <span className="text-gray-500 ml-1">({percentage.toFixed(1)}%)</span>
                  </span>
                </div>
              );
            })}
          </div>
          <div className="mt-3 text-center text-xs text-red-600 font-semibold bg-red-50 p-2 rounded">
            ⚠️ 課題：X社関連資産（株式＋不動産）が全体の約55.4%を占めており、遺留分対策や納税資金の確保が急務です。
          </div>
        </div>
      );
    };

    // 2. 金庫株の課税関係比較図 (Tax Comparison Chart)
    const TaxComparisonChart = () => {
      return (
        <div className="my-6 p-6 bg-white rounded-xl border border-gray-200 shadow-sm">
          <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center justify-center">
            <IconChartBar /><span className="ml-2">金庫株譲渡時の課税関係の比較</span>
          </h3>
          <p className="text-sm text-gray-600 text-center mb-6">自社株を会社に買い取ってもらう（金庫株にする）タイミングによる税務上の違い</p>
          
          <div className="flex flex-col md:flex-row gap-8 items-stretch justify-center">
            
            {/* 生前譲渡のバー */}
            <div className="flex-1 flex flex-col items-center">
              <div className="bg-red-50 text-red-800 font-bold px-4 py-2 rounded-t-lg w-full text-center border-b-2 border-red-200">
                ① 生前譲渡 (原則)
              </div>
              <div className="w-full h-64 flex flex-col-reverse bg-gray-50 border border-gray-200 rounded-b-lg overflow-hidden relative group">
                {/* 取得費部分 */}
                <div className="h-[15%] w-full bg-gray-300 flex items-center justify-center border-t border-gray-400">
                  <span className="text-xs font-semibold text-gray-700">取得費</span>
                </div>
                {/* 譲渡益部分 */}
                <div className="h-[25%] w-full bg-blue-200 flex flex-col items-center justify-center border-t border-blue-300 relative">
                  <span className="text-sm font-bold text-blue-800 z-10">譲渡対価</span>
                  <span className="text-xs text-blue-700 z-10">（資本金等の額）</span>
                  {/* 注釈吹き出し */}
                  <div className="absolute right-0 translate-x-full ml-2 w-32 bg-white text-xs border border-blue-200 p-2 rounded shadow-lg hidden group-hover:block z-20">
                    <span className="font-bold text-blue-700">分離課税 20.315%</span>
                    <br/>(譲渡対価 - 取得費)に対して課税
                  </div>
                </div>
                {/* みなし配当部分 */}
                <div className="h-[60%] w-full bg-red-200 flex flex-col items-center justify-center relative">
                  <span className="text-lg font-bold text-red-800 z-10">みなし配当</span>
                  <span className="text-xs font-semibold text-red-700 mt-1 z-10">資本金等の額を超える部分</span>
                  <div className="mt-2 bg-red-100 px-2 py-1 rounded text-xs font-bold text-red-700 border border-red-300 z-10">
                    総合課税 (最大約55%)
                  </div>
                </div>
              </div>
              <p className="text-xs text-gray-600 mt-3 text-center h-10">
                資本金等の額を超える部分は「配当」とみなされ、累進税率により税負担が非常に重くなる。
              </p>
            </div>

            {/* 相続後譲渡のバー */}
            <div className="flex-1 flex flex-col items-center">
              <div className="bg-green-50 text-green-800 font-bold px-4 py-2 rounded-t-lg w-full text-center border-b-2 border-green-200">
                ② 相続後譲渡 (特例適用)
              </div>
              <div className="w-full h-64 flex flex-col-reverse bg-gray-50 border border-gray-200 rounded-b-lg overflow-hidden relative group">
                {/* 取得費部分 */}
                <div className="h-[15%] w-full bg-gray-300 flex flex-col items-center justify-center border-t border-gray-400 relative">
                  <span className="text-xs font-semibold text-gray-700 z-10">取得費</span>
                  {/* 取得費加算の特例を表現する矢印 */}
                  <div className="absolute -top-3 right-2 text-[10px] text-green-700 font-bold flex flex-col items-center animate-bounce">
                    <span>↑特例で加算</span>
                  </div>
                </div>
                {/* 譲渡益部分 (全体) */}
                <div className="h-[85%] w-full bg-green-200 flex flex-col items-center justify-center border-t border-green-300 relative">
                  <span className="text-lg font-bold text-green-800 z-10">全額が譲渡対価</span>
                  <span className="text-xs font-semibold text-green-700 mt-1 z-10">（みなし配当課税なし）</span>
                  <div className="mt-4 bg-green-100 px-3 py-1 rounded text-sm font-bold text-green-700 border border-green-300 shadow-sm z-10">
                    分離課税 (一律 20.315%)
                  </div>
                  {/* 注釈吹き出し */}
                  <div className="absolute left-0 -translate-x-full mr-2 w-32 bg-white text-xs border border-green-200 p-2 rounded shadow-lg hidden group-hover:block z-20">
                    相続税申告期限から3年以内の譲渡であれば特例適用。<br/>さらに「取得費加算の特例」も併用可能。
                  </div>
                </div>
              </div>
              <p className="text-xs text-gray-600 mt-3 text-center h-10">
                みなし配当課税が行われず、全額が申告分離課税となるため、手元に多くの資金を残せる。
              </p>
            </div>

          </div>
        </div>
      );
    };

    // --- Panel Components ---

    // 1. 設例概要パネル
    const OverviewPanel = () => (
      <div className="space-y-6 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">設例の概要（5W1H分析）</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <h3 className="font-bold text-lg text-blue-800 mb-3 flex items-center"><IconUser /><span className="ml-2">登場人物・企業</span></h3>
            <ul className="space-y-2 text-gray-700 text-sm">
              <li><span className="font-semibold text-gray-900">Aさん(70歳):</span> X社代表取締役社長。40年前に弟と創業。</li>
              <li><span className="font-semibold text-gray-900">弟Eさん(68歳):</span> X社専務取締役。体調不良。20%の株式保有。</li>
              <li><span className="font-semibold text-gray-900">甥Fさん(45歳):</span> Eさんの長男。X社技術部長。後継者予定。</li>
              <li><span className="font-semibold text-gray-900">非後継者:</span> 長女Cさん(37歳)、二女Dさん(34歳)。</li>
            </ul>
          </div>
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <h3 className="font-bold text-lg text-green-800 mb-3 flex items-center"><IconBriefcase /><span className="ml-2">現状の課題・目的</span></h3>
            <ul className="space-y-2 text-gray-700 text-sm">
              <li><span className="font-semibold">事業承継:</span> Fさんへの円滑な株式・経営権の移転（事業承継税制）。</li>
              <li><span className="font-semibold">資産承継:</span> Cさん、Dさんの遺留分対策と納税資金の確保。</li>
              <li><span className="font-semibold">手法:</span> 事業承継税制、金庫株の特例、遺留分に関する民法特例の活用。</li>
            </ul>
          </div>
        </div>
        
        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mt-6">
          <h3 className="font-bold text-lg text-purple-800 mb-3">Aさんの財産構成と評価額</h3>
          
          {/* 追加：財産構成グラフ */}
          <AssetBreakdownChart />

          <div className="overflow-x-auto">
            <table className="min-w-full text-sm text-left text-gray-700 border-collapse">
              <thead className="bg-gray-100 text-gray-900 border-b-2 border-gray-200">
                <tr><th className="px-4 py-3">財産項目</th><th className="px-4 py-3 text-right">評価額</th><th className="px-4 py-3 text-right">構成比</th></tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                <tr><td className="px-4 py-2 border-l-4 border-blue-400">1. 現預金</td><td className="px-4 py-2 text-right">1億800万円</td><td className="px-4 py-2 text-right text-gray-500">20.8%</td></tr>
                <tr><td className="px-4 py-2 border-l-4 border-purple-400">2. 上場株式</td><td className="px-4 py-2 text-right">2,400万円</td><td className="px-4 py-2 text-right text-gray-500">4.6%</td></tr>
                <tr className="bg-red-50"><td className="px-4 py-2 font-semibold border-l-4 border-red-500">3. X社株式 (80%)</td><td className="px-4 py-2 text-right font-semibold text-red-600">1億6,800万円</td><td className="px-4 py-2 text-right text-red-500 font-semibold">32.3%</td></tr>
                <tr><td className="px-4 py-2 border-l-4 border-green-400">4. 自宅 (土地・建物)</td><td className="px-4 py-2 text-right">1億円</td><td className="px-4 py-2 text-right text-gray-500">19.2%</td></tr>
                <tr className="bg-orange-50"><td className="px-4 py-2 font-semibold border-l-4 border-orange-400">5. X社本社・工場土地</td><td className="px-4 py-2 text-right font-semibold text-orange-600">1億2,000万円</td><td className="px-4 py-2 text-right text-orange-500 font-semibold">23.1%</td></tr>
                <tr className="font-bold bg-gray-200 border-t-2 border-gray-300"><td className="px-4 py-3">合計</td><td className="px-4 py-3 text-right">5億2,000万円</td><td className="px-4 py-3 text-right">100.0%</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );

    // 2. SWOT分析パネル
    const SwotPanel = () => (
      <div className="space-y-6 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">相談者のSWOT分析</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="bg-blue-50 p-5 rounded-xl border border-blue-200 shadow-sm hover:shadow-md transition-shadow">
            <h3 className="font-bold text-xl text-blue-900 mb-2 border-b border-blue-200 pb-1">S (Strengths: 強み)</h3>
            <ul className="list-disc list-inside space-y-2 text-sm text-blue-800 mt-3">
              <li>取引先から高く評価される技術力。業績好調。</li>
              <li>既に後継者(Fさん)が技術部門の中核であり、就任を承諾済。</li>
              <li>事業承継税制の特例承継計画を県知事に提出し、確認済。</li>
            </ul>
          </div>
          <div className="bg-red-50 p-5 rounded-xl border border-red-200 shadow-sm hover:shadow-md transition-shadow">
            <h3 className="font-bold text-xl text-red-900 mb-2 border-b border-red-200 pb-1">W (Weaknesses: 弱み)</h3>
            <ul className="list-disc list-inside space-y-2 text-sm text-red-800 mt-3">
              <li>Aさんの財産における自社株と事業用不動産の割合が高い（約55%）。</li>
              <li>非後継者(長女・二女)が経営に関心がなく、相続時に遺留分トラブルのリスクがある。</li>
            </ul>
          </div>
          <div className="bg-green-50 p-5 rounded-xl border border-green-200 shadow-sm hover:shadow-md transition-shadow">
            <h3 className="font-bold text-xl text-green-900 mb-2 border-b border-green-200 pb-1">O (Opportunities: 機会)</h3>
            <ul className="list-disc list-inside space-y-2 text-sm text-green-800 mt-3">
              <li>事業承継税制の特例措置（100％納税猶予）が利用可能。</li>
              <li><span className="font-bold bg-green-200 px-1 rounded">みなし配当課税の特例</span>や、取得費加算の特例など、有利な税制が存在。</li>
              <li>遺留分に関する民法特例（除外合意・固定合意）が利用可能。</li>
            </ul>
          </div>
          <div className="bg-yellow-50 p-5 rounded-xl border border-yellow-200 shadow-sm hover:shadow-md transition-shadow">
            <h3 className="font-bold text-xl text-yellow-900 mb-2 border-b border-yellow-200 pb-1">T (Threats: 脅威)</h3>
            <ul className="list-disc list-inside space-y-2 text-sm text-yellow-800 mt-3">
              <li>弟Eさんの体調不良。万が一Aさんより先に相続が発生した場合、Eさん保有株(20%)が分散し権利関係が複雑化する恐れ。</li>
            </ul>
          </div>
        </div>
      </div>
    );

    // 3. Q&A 解説パネル
    const QaItem = ({ question, answer, explanation, isCrucial, children }: { question: string, answer: string, explanation: string, isCrucial?: boolean, children?: React.ReactNode }) => {
      const [isOpen, setIsOpen] = useState(isCrucial || false); // 重要なものは初期状態で開く
      return (
        <div className={`border rounded-lg mb-4 overflow-hidden transition-all duration-200 shadow-sm ${isCrucial ? 'border-red-300 ring-1 ring-red-100' : 'border-gray-200'}`}>
          <button 
            className={`w-full text-left px-5 py-4 flex justify-between items-center focus:outline-none ${isOpen ? 'bg-gray-50' : 'bg-white hover:bg-gray-50'} ${isCrucial ? 'bg-red-50/50' : ''}`}
            onClick={() => setIsOpen(!isOpen)}
          >
            <span className={`font-semibold text-base ${isCrucial ? 'text-red-700' : 'text-gray-800'}`}>
              {isCrucial && <span className="inline-block mr-2 text-red-500">★重要</span>}
              Q. {question}
            </span>
            {isOpen ? <IconChevronUp /> : <IconChevronDown />}
          </button>
          {isOpen && (
            <div className="px-5 py-4 bg-white border-t border-gray-100">
              <div className="mb-4">
                <span className="inline-block px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded mr-2 shadow-sm">正解</span>
                <span className="text-gray-900 font-bold text-lg">{answer}</span>
              </div>
              <div className="bg-blue-50/50 p-4 rounded-lg text-sm text-gray-700 border-l-4 border-blue-400">
                <p className="font-bold text-blue-900 mb-2">解説</p>
                <p className="leading-relaxed">{explanation}</p>
              </div>
              {children && (
                <div className="mt-4 border-t border-gray-100 pt-4">
                  {children}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const QaPanel = () => (
      <div className="space-y-4 animate-fade-in">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2 flex items-center justify-between">
          <span>Q&A 解説：金庫株の論点</span>
          <span className="text-xs font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded">重要項目は開いています</span>
        </h2>
        
        <QaItem 
          question="金庫株とはどのようなものですか？" 
          answer="企業が自社の株式を買い戻して保有する株式（自己株式）" 
          explanation="売買などの予定がない、流動性の低い株式というだけでなく、具体的には「発行会社自身が取得・保有している自己株式」のことを指します。FP実務では、非上場会社の事業承継における資金捻出や分散防止策として頻出します。" 
        />
        
        <QaItem 
          question="現時点でAさんが金庫株により換金した場合の課税関係は？" 
          answer="配当所得として総合課税（みなし配当）"
